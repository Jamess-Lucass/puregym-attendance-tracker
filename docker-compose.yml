name: puregym

services:
  collector:
    build: .
    restart: unless-stopped
    environment:
      PUREGYM_EMAIL: ${PUREGYM_EMAIL:?set in .env}
      PUREGYM_PIN: ${PUREGYM_PIN:?set in .env}
      PUREGYM_GYM_ID: ${PUREGYM_GYM_ID:?set in .env}
      PUREGYM_GYM_NAME: ${PUREGYM_GYM_NAME:?set in .env}
      POLL_INTERVAL: ${POLL_INTERVAL:-5m}
      OTEL_EXPORTER_OTLP_ENDPOINT: alloy:4317
    depends_on:
      alloy:
        condition: service_started

  alloy:
    image: grafana/alloy:v1.16.1
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "12345:12345" # Alloy UI — useful for debugging the pipeline
    depends_on:
      prometheus:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.11.3
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=5y
      - --web.enable-remote-write-receiver # accept remote_write from Alloy
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:12.4
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "6060:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  alloy-data:
  prometheus-data:
  grafana-data:
